<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deepfake Detector - Проверка</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <div class="brand">Deepfake Detector</div>
          <h1 class="page-title">Проверка файла</h1>
        </div>
        <a class="nav-link" href="./index.html">На главную</a>
      </header>

      <section class="card">
        <div class="option-list" role="tablist" aria-label="Выбор способа загрузки">
          <button id="modeFileButton" class="option option-button active" type="button" role="tab" aria-selected="true">
            <span>
              <strong>Загрузить файл с компьютера</strong>
            </span>
            <span class="badge">Доступно</span>
          </button>

          <button id="modeUrlButton" class="option option-button" type="button" role="tab" aria-selected="false">
            <span>
              <strong>Проверить файл по URL</strong>
            </span>
            <span class="badge">Доступно</span>
          </button>
        </div>

        <div class="upload-panel">
          <section id="fileSection">
            <form id="detectForm" novalidate>
              <div class="form-row">
                <label for="fileContentTypeSelect">Тип контента</label>
                <select id="fileContentTypeSelect" required>
                  <option value="photo" selected>Фото</option>
                  <option value="video">Видео</option>
                  <option value="audio">Аудио</option>
                </select>
              </div>

              <div class="form-row">
                <label for="fileInput" id="fileInputLabel">Файл изображения</label>
                <input id="fileInput" type="file" accept="image/*" required />
              </div>

              <div class="form-row">
                <label for="modelSelect">Модель (необязательно)</label>
                <select id="modelSelect">
                  <option value="">Загрузка моделей...</option>
                </select>
              </div>

              <div class="form-row">
                <label for="thresholdInput">Порог срабатывания (%)</label>
                <input id="thresholdInput" type="number" min="0" max="100" step="1" value="50" />
              </div>

              <div class="button-row">
                <button id="submitButton" type="submit">Проверить изображение</button>
                <button id="resetButton" class="secondary" type="button">Сброс</button>
              </div>
            </form>
          </section>

          <section id="urlSection" class="hidden">
            <form id="urlForm" novalidate>
              <div class="form-row">
                <label for="urlInput">Ссылка на файл</label>
                <input id="urlInput" type="url" placeholder="https://..." required />
              </div>

              <div class="form-row">
                <label for="urlContentTypeSelect">Тип контента</label>
                <select id="urlContentTypeSelect" required>
                  <option value="photo" selected>Фото</option>
                  <option value="video">Видео</option>
                  <option value="audio">Аудио</option>
                </select>
              </div>

              <div class="form-row">
                <label for="urlModelSelect">Модель (необязательно)</label>
                <select id="urlModelSelect">
                  <option value="">Загрузка моделей...</option>
                </select>
              </div>

              <div class="form-row">
                <label for="thresholdInputUrl">Порог срабатывания (%)</label>
                <input id="thresholdInputUrl" type="number" min="0" max="100" step="1" value="50" />
              </div>

              <div class="button-row">
                <button id="urlSubmitButton" type="submit">Проверить по URL</button>
                <button id="urlResetButton" class="secondary" type="button">Сброс</button>
              </div>
            </form>
          </section>

          <div id="status" class="status" role="status" aria-live="polite"></div>

          <section id="result" class="result hidden">
            <h3>Результат проверки</h3>
            <div class="result-grid">
              <div class="kv"><strong>Вероятность</strong><span id="resultPercent">Н/Д</span></div>
              <div class="kv"><strong>Вердикт</strong><span id="resultVerdict">Н/Д</span></div>
              <div class="kv"><strong>Метка</strong><span id="resultLabel">Н/Д</span></div>
              <div class="kv"><strong>Используемая модель</strong><span id="resultModel">Н/Д</span></div>
              <div class="kv"><strong>Порог срабатывания</strong><span id="resultThreshold">Н/Д</span></div>
            </div>

            <section id="heatmapSection" class="heatmap-panel hidden" aria-live="polite">
              <h4>Карта внимания</h4>

              <div id="regionsSection" class="regions-panel hidden">
                <h4>Спорные области на исходном изображении</h4>
                <canvas id="regionsCanvas" class="heatmap-canvas" width="256" height="256"></canvas>
                <div id="regionsMeta" class="muted"></div>
              </div>

              <canvas id="heatmapCanvas" class="heatmap-canvas" width="256" height="256"></canvas>
              <div id="heatmapMeta" class="muted"></div>

              <div id="videoHeatmapControls" class="heatmap-controls hidden">
                <button id="heatmapPrevFrame" class="secondary" type="button">Предыдущий кадр</button>
                <label for="heatmapFrameRange" class="muted">Кадр</label>
                <input id="heatmapFrameRange" type="range" min="0" max="0" step="1" value="0" />
                <button id="heatmapNextFrame" class="secondary" type="button">Следующий кадр</button>
              </div>

              <div id="heatmapFrameIndicator" class="muted"></div>
            </section>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="./assets/js/check.js"></script>
  </body>
</html>
