<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deepfake Detector - Защита</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <div class="brand">Deepfake Detector</div>
          <h1 class="page-title">Защита файла от создания дипфейка</h1>
          <p class="subtitle">Эта возможность backend пока не реализована, поэтому экран работает как заглушка.</p>
        </div>
        <a class="nav-link" href="./index.html">На главную</a>
      </header>

      <section class="card">
        <div class="option disabled">
          <div>
            <strong>Загрузка и преобразование файла</strong>
            <div class="muted">Ожидается реализация endpoint в backend.</div>
          </div>
          <span class="badge warning">Скоро</span>
        </div>

        <div class="upload-panel">
          <div class="form-row">
            <label for="protectInput">Выберите файл</label>
            <input id="protectInput" type="file" disabled />
          </div>
          <div class="button-row">
            <button id="protectButton" type="button" disabled>Защитить файл</button>
          </div>
          <div id="status" class="status" role="status" aria-live="polite">Функция недоступна в текущем backend.</div>
        </div>
      </section>
    </main>

    <script type="module" src="./assets/js/protect.js"></script>
  </body>
</html>
